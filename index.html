<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/jquery/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@hiseb/confetti@2.1.0/dist/confetti.min.js"></script>
    <script src="dist/flipClock.min.js"></script>
    <link type="text/css" rel="stylesheet" href="./dist/flipClock.min.css" />
    <link type="text/css" rel="stylesheet" href="./dist/style.min.css" />
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://meatimer.vercel.app">
    <meta property="og:title" content="Timer da aposta da mea (Falta pouco tempo)">
    <meta property="og:description" content="Veja em tempo real quanto tempo falta para mea perder a aposta!!">
    <meta property="og:image" content="images/meaTimer.png">
    <meta name="theme-color" content="#ea76cb">
    <title>meaTimer</title>
  </head>
  <body>
    <div class="enter">
      <p class="text textenter">Clique para ver o timer</p>
    </div>
    <div class="intro">
      <h1 class="text title">mea relacionamentos</h1>
      <p class="text">
        veja quanto tempo falta para o fim de sua aposta em tempo real!
      </p>
      <img class="mea1" src="./images/meacommedo.png" />
    </div>
    <div class="timer">
      <div class="timerend blink">00:00:00</div>
      <div class="clock"></div>
    </div>
    <div class="info">
      <p class="text">01/07/2026 - UTC: -03:00 (Horário de Brasília)</p>
      <p class="text texinfo">A mea tem pouco tempo para arrumar um namoradinho <br>e pra comemorar essa data, eu criei esse website</p>
    </div>
  </body>
  <script src="dist/timer.min.js" type="text/javascript"></script>
</html>
